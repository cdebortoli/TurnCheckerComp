name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare Windows artifact bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item target/release/turn_checker_comp.exe dist/windows/
          Copy-Item target/release/graphics.toml dist/windows/
          Copy-Item target/release/parameters.txt dist/windows/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: turn_checker_comp-windows
          path: dist/windows
          if-no-files-found: error
