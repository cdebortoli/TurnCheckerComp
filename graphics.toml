# Turn Checker Companion graphics configuration
# This file is read on Windows from the same folder as the executable.
# If the file is missing, the app recreates it with these defaults.

# Available values: "glow", "wgpu"
renderer = "glow"

# true  -> keep the transparent window behavior
# false -> use an opaque window for testing
transparency = true

# Used only when renderer = "glow"
# Available values: "off", "preferred", "required"
glow_hardware_acceleration = "required"

# Used only when renderer = "wgpu"
# Available values:
# "fifo", "auto_vsync", "auto_no_vsync", "mailbox", "immediate", "fifo_relaxed"
wgpu_present_mode = "fifo"

# Used only when renderer = "wgpu"
# Available values: "low_power", "high_performance", "none"
wgpu_power_preference = "low_power"

# Optional log file path.
# Relative paths are resolved from the executable folder.
# diagnostics_log_path = "turn_checker_comp_windows_graphics.log"
