name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          TURN_CHECKER_PUSH_BEARER_TOKEN: ${{ secrets.TURN_CHECKER_PUSH_BEARER_TOKEN }}
        run: cargo build --release --locked

      - name: Package macOS archive
        run: |
          mkdir -p dist/macos
          cp target/release/turn_checker_comp dist/macos/
          cp target/release/graphics.toml dist/macos/
          cp target/release/parameters.txt dist/macos/
          ditto -c -k --sequesterRsrc --keepParent dist/macos turn_checker_comp-macos.zip

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: turn_checker_comp-macos
          path: turn_checker_comp-macos.zip
          if-no-files-found: error

      - name: Attest macOS archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: turn_checker_comp-macos.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        env:
          TURN_CHECKER_PUSH_BEARER_TOKEN: ${{ secrets.TURN_CHECKER_PUSH_BEARER_TOKEN }}
        run: cargo build --release --locked

      - name: Prepare Windows archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item target/release/turn_checker_comp.exe dist/windows/
          Copy-Item target/release/graphics.toml dist/windows/
          Copy-Item target/release/parameters.txt dist/windows/
          Compress-Archive -Path dist/windows/* -DestinationPath turn_checker_comp-windows.zip -Force

      - name: Upload Windows archive
        uses: actions/upload-artifact@v4
        with:
          name: turn_checker_comp-windows
          path: turn_checker_comp-windows.zip
          if-no-files-found: error

      - name: Attest Windows archive
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: turn_checker_comp-windows.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          pattern: turn_checker_comp-*
          path: release-assets
          merge-multiple: true

      - name: Generate SHA256 sums
        run: |
          cd release-assets
          sha256sum *.zip > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/SHA256SUMS.txt
